name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Typecheck and export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate expo-env.d.ts
        run: echo '/// <reference types="expo/types" />' > expo-env.d.ts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Export web bundle
        run: npx expo export --platform web --output-dir /tmp/english-study-web-export
