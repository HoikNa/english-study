AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SpeakReadyMY FastAPI backend on AWS Lambda and API Gateway.

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: Supabase/PostgreSQL connection string.
  JwtSecret:
    Type: String
    NoEcho: true
    Description: Secret used to sign access and refresh tokens.
  AzureSpeechKey:
    Type: String
    NoEcho: true
    Default: ""
  AzureSpeechRegion:
    Type: String
    Default: eastus
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ""
  OpenAiGptModel:
    Type: String
    Default: gpt-4o
  OpenAiFeedbackModel:
    Type: String
    Default: gpt-4.1-nano
  OpenAiTtsVoice:
    Type: String
    Default: nova
  SupabaseUrl:
    Type: String
    Default: ""
  SupabaseServiceKey:
    Type: String
    NoEcho: true
    Default: ""
  SupabaseStorageBucket:
    Type: String
    Default: tts-cache
  SentryDsn:
    Type: String
    NoEcho: true
    Default: ""
  SentryTracesSampleRate:
    Type: Number
    Default: 0.05
  SentryTestToken:
    Type: String
    NoEcho: true
    Default: ""
  AiRateLimitWindowSeconds:
    Type: Number
    Default: 60
  AiRateLimitMaxRequests:
    Type: Number
    Default: 30
  ApiThrottleBurstLimit:
    Type: Number
    Default: 20
  ApiThrottleRateLimit:
    Type: Number
    Default: 10
  FfmpegBinary:
    Type: String
    Default: /opt/bin/ffmpeg
  CorsAllowOrigins:
    Type: String
    Default: exp://localhost:8081,speakready://
  AlarmEmail:
    Type: String
    Default: ""
    Description: Optional email address for CloudWatch alarm notifications.

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        ENVIRONMENT: production
        APP_SECRET_ID: !Ref AppSecret
        JWT_ALGORITHM: HS256
        JWT_EXPIRE_MINUTES: "1440"
        JWT_REFRESH_EXPIRE_MINUTES: "43200"
        AZURE_SPEECH_REGION: !Ref AzureSpeechRegion
        FFMPEG_BINARY: !Ref FfmpegBinary
        OPENAI_GPT_MODEL: !Ref OpenAiGptModel
        OPENAI_FEEDBACK_MODEL: !Ref OpenAiFeedbackModel
        OPENAI_TTS_VOICE: !Ref OpenAiTtsVoice
        SUPABASE_STORAGE_BUCKET: !Ref SupabaseStorageBucket
        GPT_MONTHLY_BUDGET_USD: "30"
        GEMINI_FALLBACK_ENABLED: "true"
        AI_RATE_LIMIT_WINDOW_SECONDS: !Ref AiRateLimitWindowSeconds
        AI_RATE_LIMIT_MAX_REQUESTS: !Ref AiRateLimitMaxRequests
        SENTRY_TRACES_SAMPLE_RATE: !Ref SentryTracesSampleRate
        CORS_ALLOW_ORIGINS: !Ref CorsAllowOrigins

Resources:
  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/app"
      Description: SpeakReadyMY backend runtime secrets.
      SecretString: !Sub |
        {
          "DATABASE_URL": "${DatabaseUrl}",
          "JWT_SECRET": "${JwtSecret}",
          "AZURE_SPEECH_KEY": "${AzureSpeechKey}",
          "OPENAI_API_KEY": "${OpenAiApiKey}",
          "SUPABASE_URL": "${SupabaseUrl}",
          "SUPABASE_SERVICE_KEY": "${SupabaseServiceKey}",
          "SENTRY_DSN": "${SentryDsn}",
          "SENTRY_TEST_TOKEN": "${SentryTestToken}"
        }

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub "${AWS::StackName}-alarms"

  AlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlarmEmail
      TopicArn: !Ref AlarmTopic

  FfmpegLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-ffmpeg"
      ContentUri: ../.lambda-layers/ffmpeg
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - x86_64
      RetentionPolicy: Delete

  SpeakReadyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      DefaultRouteSettings:
        ThrottlingBurstLimit: !Ref ApiThrottleBurstLimit
        ThrottlingRateLimit: !Ref ApiThrottleRateLimit
      CorsConfiguration:
        AllowCredentials: true
        AllowHeaders:
          - "*"
        AllowMethods:
          - "*"
        AllowOrigins: !Split [",", !Ref CorsAllowOrigins]

  SpeakReadyApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Layers:
        - !Ref FfmpegLayer
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref AppSecret
      Events:
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref SpeakReadyHttpApi
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref SpeakReadyHttpApi
            Path: /{proxy+}
            Method: ANY

  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: SpeakReadyMY backend Lambda reported at least one invocation error in 5 minutes.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SpeakReadyApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmEmail
        - - !Ref AlarmTopic
        - !Ref AWS::NoValue
      OKActions: !If
        - HasAlarmEmail
        - - !Ref AlarmTopic
        - !Ref AWS::NoValue

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: SpeakReadyMY backend Lambda average duration stayed above 25 seconds for 10 minutes.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref SpeakReadyApiFunction
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 25000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmEmail
        - - !Ref AlarmTopic
        - !Ref AWS::NoValue
      OKActions: !If
        - HasAlarmEmail
        - - !Ref AlarmTopic
        - !Ref AWS::NoValue

Outputs:
  ApiUrl:
    Description: API Gateway base URL.
    Value: !Sub "https://${SpeakReadyHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  AlarmTopicArn:
    Condition: HasAlarmEmail
    Description: SNS topic used by CloudWatch alarms.
    Value: !Ref AlarmTopic
